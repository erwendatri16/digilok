name: digilok
description: "Aplikasi Logbook Digital dan Absensi Berbasis Radius"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  supabase_flutter: ^2.5.6
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  geolocator: ^12.0.0
  intl: ^0.19.0
  pdf: ^3.10.8
  printing: ^5.12.0
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
  url_launcher: ^6.2.0
  file_picker: ^8.1.2
  pdfx: ^2.7.0
  http: ^1.2.0
  path_provider: ^2.1.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/logo.jpeg"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/logo.jpeg"

flutter:
  uses-material-design: true

  assets:
    - assets/icons/